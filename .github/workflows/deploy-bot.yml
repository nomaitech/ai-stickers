name: Build, Push and Deploy Sentry bot to K3S cluster

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-bot.yml'
      - 'sentryBot/**'

env:
  IMAGE_NAME: pdr.jonbesga.com/sentry-bot
  IMAGE_TAG: ${{ github.sha }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to private registry
      run: echo ${{ secrets.REGISTRY_PASSWORD }} | docker login pdr.jonbesga.com -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

    - name: Build Docker image
      run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

    - name: Push Docker image
      run: docker push $IMAGE_NAME:$IMAGE_TAG

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Update deployment with new image
      run: |
        sed -i "s|image: .*|image: $IMAGE_NAME:$IMAGE_TAG|" k8s/deployment.yaml
        kubectl apply -f k8s/deployment.yaml
