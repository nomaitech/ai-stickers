name: Build, Push and Deploy to K3S cluster

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '!client/**'
      - '!Makefile'
      - '!README.md'

env:
  IMAGE_NAME: pdr.jonbesga.com/ai-sticker
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to private registry
      run: echo ${{ secrets.REGISTRY_PASSWORD }} | docker login pdr.jonbesga.com -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

    - name: Build Docker image
      run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

    - name: Push Docker image
      run: docker push $IMAGE_NAME:$IMAGE_TAG

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
      steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Run database migrations
        run: |
          sed -i "s|image: .*|image: $IMAGE_NAME:$IMAGE_TAG|" k8s/migration-job.yaml
          kubectl apply -f k8s/migration-job.yaml
          kubectl wait --for=condition=complete --timeout=300s job/ai-sticker-api-migrate -n ai-stickers
          kubectl delete job ai-sticker-api-migrate -n ai-stickers

      - name: Update deployment with new image
        run: |
          sed -i "s|image: .*|image: $IMAGE_NAME:$IMAGE_TAG|" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
